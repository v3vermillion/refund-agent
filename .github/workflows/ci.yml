name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed mock data
        run: python scripts/seed_data.py

      - name: Run test suite
        working-directory: backend
        # ANTHROPIC_API_KEY is read from repo secrets so the live injection
        # suite runs in CI. If the secret is ever absent (e.g. a fork PR),
        # those tests skip automatically and the deterministic tool/policy-fact
        # tests still run — CI stays green either way.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/ -q
