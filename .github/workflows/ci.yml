name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed mock data
        run: python scripts/seed_data.py

      - name: Run test suite
        working-directory: backend
        # No ANTHROPIC_API_KEY in CI → the live-agent injection tests skip
        # automatically; the deterministic tool/policy-fact tests still run.
        run: python -m pytest tests/ -q
